{% load static %}

{% with featured=award.featured|default:False %}
<div class="{% if featured %}rounded-[24px]{% endif %}">
    <article class="relative overflow-hidden rounded-[16px] bg-white p-px shadow-[0px_4px_20px_0px_rgba(13,43,92,0.08)]">
        <div class="overflow-hidden rounded-t-[15px]">
            <div class="relative min-h-[220px] w-full overflow-hidden bg-slate-100">
                <img src="{% static award.image %}" alt="{{ award.image_alt|default:award.title }}" class="absolute inset-0 size-full max-w-none object-cover">
                {% comment %} <div class="absolute right-5 top-4 rounded-[4px] bg-[#d4af37] px-3 py-[5px]">
                    <p class="whitespace-nowrap text-[12px] font-extrabold uppercase tracking-[0.08em] text-[#0d2b5c]">
                        {{ award.year }}
                    </p>
                </div> {% endcomment %}
            </div>
        </div>

        <div class="px-6 pb-6 pt-[22px]">
            <div class="h-[3px] w-8 rounded-[2px] bg-[#d4af37]"></div>
            <h3 class="mt-3 text-[16.8px] font-bold leading-[1.4] text-[#0d2b5c]" style="font-family: 'Playfair Display', serif;">
                {{ award.title }}
            </h3>
            <p class="mt-3 text-[13px] leading-[1.5] text-[#6f7d99]">
                {{ award.source }}
            </p>
        </div>
    </article>
</div>
{% endwith %}
