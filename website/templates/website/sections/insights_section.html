{% load static %}

<section id="{{ section_id|default:'insights' }}" class="py-24 sm:py-32 bg-white relative">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-16 gap-4 scroll-anim-blogs">
            <div class="space-y-3">
                <span class="text-xs font-bold text-indigo-600 uppercase tracking-widest">MY Insights</span>
                <h2 class="text-3xl sm:text-5xl font-extrabold text-slate-900 font-serif tracking-tight">Latest Insights & Blogs</h2>
                <div class="h-0.5 w-16 bg-indigo-600 rounded"></div>
            </div>
            <a href="{{ view_all_url|default:'#appointments' }}"
               class="inline-flex items-center justify-center px-6 py-3 border border-slate-200 hover:border-indigo-600 hover:text-indigo-600 text-sm font-bold text-slate-700 rounded-xl transition duration-300 shadow-sm mt-4 sm:mt-0">
                View All Blogs
                <i data-lucide="external-link" class="ml-2 w-4 h-4"></i>
            </a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 scroll-anim-blogs">
            {% for post in insights %}
            <div class="bg-white border border-slate-100 rounded-2xl shadow-md overflow-hidden flex flex-col group hover:border-indigo-200 hover:shadow-xl transition duration-500 transform hover:-translate-y-1">
                <div class="aspect-video relative overflow-hidden bg-slate-100">
                    <img src="{% static 'images/' %}{{ post.image_filename }}" alt="{{ post.title }}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
                    <div class="absolute inset-0 bg-slate-950/10 group-hover:bg-transparent transition duration-300"></div>
                </div>

                <div class="p-6 flex-grow flex flex-col justify-between space-y-6">
                    <div class="space-y-3">
                        <div class="flex items-center justify-between text-xs font-semibold">
                            <span class="px-2.5 py-1 bg-indigo-50 text-indigo-700 rounded-full border border-indigo-100">
                                {{ post.get_category_display }}
                            </span>
                            <span class="text-slate-400 flex items-center gap-1">
                                <i data-lucide="calendar" class="w-3.5 h-3.5"></i>
                                {{ post.published_date|date:"d M Y" }}
                            </span>
                        </div>
                        <h4 class="text-xl font-bold font-serif text-slate-900 leading-snug group-hover:text-indigo-600 transition">
                            {{ post.title }}
                        </h4>
                        <p class="text-sm text-slate-500 leading-relaxed font-light line-clamp-3">
                            {{ post.summary }}
                        </p>
                    </div>

                    <div class="border-t border-slate-50 pt-4">
                        <a href="{{ post.read_more_link }}" class="inline-flex items-center gap-1 text-sm font-bold text-indigo-600 group-hover:text-slate-900 transition-colors">
                            <span>Read More</span>
                            <i data-lucide="chevron-right" class="w-4 h-4 transform group-hover:translate-x-1.5 transition"></i>
                        </a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
